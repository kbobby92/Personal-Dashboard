<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin's Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f0e8;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    color: #2c2416;
  }

  .dash { max-width: 1000px; margin: 0 auto; }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid #d4c9b0;
  }
  .header-left h1 {
    font-family: 'Lora', serif;
    font-size: 32px;
    font-weight: 400;
    color: #2c2416;
    line-height: 1.2;
  }
  .header-left p { font-size: 13px; color: #7a6a50; margin-top: 5px; }
  .clock { text-align: right; }
  .clock-time {
    font-family: 'Lora', serif;
    font-size: 36px;
    font-weight: 400;
    color: #2c2416;
    line-height: 1;
  }
  .clock-date { font-size: 12px; color: #7a6a50; margin-top: 5px; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: minmax(0,1.4fr) minmax(0,1fr);
    gap: 1.25rem;
  }
  .full-row { grid-column: 1 / -1; }

  /* ── CARD ── */
  .card {
    background: #fff9f0;
    border: 1px solid #e0d4bc;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
  }
  .card-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #9a8a6a;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ── BUTTONS ── */
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #9a8a6a;
    font-size: 16px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .icon-btn:hover { color: #4a3c28; }
  .refresh-btn {
    background: none;
    border: 1px solid #d4c9b0;
    border-radius: 6px;
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    color: #9a8a6a;
    padding: 2px 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: #ede4d0; }
  .small-add-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #9a8a6a;
    font-size: 18px;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }
  .small-add-btn:hover { color: #2c2416; }

  /* ── WEATHER ── */
  .weather-main { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
  .weather-icon { font-size: 44px; line-height: 1; }
  .weather-temp { font-family: 'Lora', serif; font-size: 48px; font-weight: 400; color: #2c2416; line-height: 1; }
  .weather-desc { font-size: 13px; color: #7a6a50; margin-top: 3px; }
  .weather-hi-lo { font-size: 13px; color: #5a4a30; margin-bottom: 6px; }
  .weather-row { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .weather-stat { font-size: 12px; color: #7a6a50; }
  .weather-stat span { color: #2c2416; font-weight: 500; }
  .muted-text { font-size: 13px; color: #9a8a6a; font-style: italic; }

  /* ── QUOTE ── */
  .quote-text {
    font-family: 'Lora', serif;
    font-size: 15px;
    font-style: italic;
    line-height: 1.65;
    color: #2c2416;
    margin-bottom: 0.6rem;
  }
  .quote-author { font-size: 12px; color: #9a8a6a; }

  /* ── PROJECTS ── */
  .project-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid #ede4d0;
  }
  .project-item:last-child { border-bottom: none; }
  .project-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .dot-active { background: #2d8a5e; }
  .dot-slow   { background: #c87d20; }
  .dot-paused { background: #b0a08a; }
  .project-body { flex: 1; min-width: 0; }
  .project-name { font-size: 14px; font-weight: 500; color: #2c2416; line-height: 1.3; }
  .project-tag  { font-size: 11px; color: #9a8a6a; margin-top: 2px; }
  .project-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; cursor: pointer; transition: opacity 0.15s; }
  .project-badge:hover { opacity: 0.7; }
  .badge-active { background: #e0f5ea; color: #1a6640; }
  .badge-slow   { background: #fdf0dc; color: #7a4a10; }
  .badge-paused { background: #ede8de; color: #6a5a40; }
  .project-del { background: none; border: none; cursor: pointer; color: #c0b090; font-size: 15px; padding: 0 2px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .project-item:hover .project-del { opacity: 1; }
  .project-del:hover { color: #8a3030; }

  /* Project edit form */
  .project-form {
    background: #f0e8d8;
    border: 1px solid #d4c9b0;
    border-radius: 10px;
    padding: 12px;
    margin-top: 10px;
    display: none;
  }
  .project-form.open { display: block; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .form-input {
    flex: 1;
    min-width: 120px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 10px;
    border: 1px solid #d4c9b0;
    border-radius: 7px;
    background: #fff9f0;
    color: #2c2416;
    outline: none;
  }
  .form-input:focus { border-color: #a09070; }
  .form-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 8px;
    border: 1px solid #d4c9b0;
    border-radius: 7px;
    background: #fff9f0;
    color: #7a6a50;
    outline: none;
    cursor: pointer;
  }
  .form-save-btn {
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    background: #2c2416;
    border: none;
    border-radius: 7px;
    color: #f5f0e8;
    cursor: pointer;
    transition: background 0.15s;
  }
  .form-save-btn:hover { background: #4a3c28; }
  .form-cancel-btn {
    padding: 7px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    background: none;
    border: 1px solid #d4c9b0;
    border-radius: 7px;
    color: #9a8a6a;
    cursor: pointer;
  }

  /* ── CALENDAR ── */
  .cal-day {
    padding: 8px 0;
    border-bottom: 1px solid #ede4d0;
  }
  .cal-day:last-child { border-bottom: none; }
  .cal-day-header {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .cal-day-header:hover .cal-num { color: #7a5a30; }
  .cal-date-block { min-width: 42px; display: flex; align-items: baseline; gap: 5px; }
  .cal-num { font-family: 'Lora', serif; font-size: 20px; font-weight: 400; color: #2c2416; line-height: 1; transition: color 0.15s; }
  .cal-dow { font-size: 10px; color: #9a8a6a; text-transform: uppercase; letter-spacing: 0.05em; }
  .cal-events { flex: 1; }
  .cal-event {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #2c2416;
    padding: 2px 0;
    line-height: 1.4;
  }
  .cal-event-del {
    background: none;
    border: none;
    cursor: pointer;
    color: #c0b090;
    font-size: 13px;
    padding: 0;
    opacity: 0;
    transition: opacity 0.15s;
    line-height: 1;
    flex-shrink: 0;
  }
  .cal-event:hover .cal-event-del { opacity: 1; }
  .cal-event-del:hover { color: #8a3030; }
  .cal-empty { font-size: 12px; color: #b0a08a; font-style: italic; }
  .today-tag {
    display: inline-block;
    background: #ddeeff;
    color: #1a5080;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 20px;
    font-weight: 500;
    margin-right: 4px;
  }
  .cal-add-row {
    display: none;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
  }
  .cal-add-row.open { display: flex; }
  .cal-add-input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 9px;
    border: 1px solid #d4c9b0;
    border-radius: 7px;
    background: #f5f0e8;
    color: #2c2416;
    outline: none;
  }
  .cal-add-input:focus { border-color: #a09070; }
  .cal-add-confirm {
    padding: 6px 12px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    background: #2c2416;
    border: none;
    border-radius: 7px;
    color: #f5f0e8;
    cursor: pointer;
  }
  .cal-add-cancel {
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    background: none;
    border: 1px solid #d4c9b0;
    border-radius: 7px;
    color: #9a8a6a;
    cursor: pointer;
  }

  /* ── INBOX ── */
  .inbox-input-row { display: flex; gap: 8px; margin-bottom: 0.9rem; }
  .inbox-input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    border: 1px solid #d4c9b0;
    border-radius: 8px;
    background: #f5f0e8;
    color: #2c2416;
    outline: none;
  }
  .inbox-input:focus { border-color: #a09070; }
  .inbox-input::placeholder { color: #b0a08a; }
  .inbox-tag-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 9px 8px;
    border: 1px solid #d4c9b0;
    border-radius: 8px;
    background: #f5f0e8;
    color: #7a6a50;
    outline: none;
    cursor: pointer;
  }
  .inbox-add-btn {
    padding: 9px 16px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    background: #2c2416;
    border: none;
    border-radius: 8px;
    color: #f5f0e8;
    cursor: pointer;
    transition: background 0.15s;
  }
  .inbox-add-btn:hover { background: #4a3c28; }
  .inbox-item { display: flex; align-items: flex-start; gap: 9px; padding: 8px 0; border-bottom: 1px solid #ede4d0; }
  .inbox-item:last-child { border-bottom: none; }
  .inbox-check {
    width: 17px; height: 17px;
    border: 1px solid #c0b090;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .inbox-check:hover { border-color: #8a7050; }
  .inbox-check.done { background: #2d8a5e; border-color: #2d8a5e; }
  .inbox-check.done::after {
    content: '';
    display: block;
    width: 9px; height: 5px;
    border-left: 1.5px solid #fff;
    border-bottom: 1.5px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }
  .inbox-text { font-size: 13px; color: #2c2416; line-height: 1.4; flex: 1; }
  .inbox-text.done { text-decoration: line-through; color: #b0a08a; }
  .inbox-pill { font-size: 10px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .pill-idea     { background: #eeedfe; color: #3c3489; }
  .pill-research { background: #e0f5ea; color: #0a5030; }
  .pill-task     { background: #ddeeff; color: #0c3a5a; }
  .pill-project  { background: #fdf0dc; color: #5a3a08; }
  .inbox-del { background: none; border: none; cursor: pointer; color: #c0b090; font-size: 16px; padding: 0 3px; opacity: 0; transition: opacity 0.15s; line-height: 1; flex-shrink: 0; }
  .inbox-item:hover .inbox-del { opacity: 1; }
  .inbox-del:hover { color: #8a3030; }
  .inbox-empty { font-size: 13px; color: #b0a08a; font-style: italic; padding: 8px 0; }
  .inbox-count { font-size: 11px; color: #9a8a6a; font-weight: 400; }

  /* ── NEWS ── */
  .news-tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .news-tab {
    font-size: 11px; padding: 4px 12px; border-radius: 20px;
    border: 1px solid #d4c9b0; background: none; cursor: pointer;
    color: #7a6a50; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .news-tab.active { background: #2c2416; color: #f5f0e8; border-color: #2c2416; }
  .news-tab:hover:not(.active) { background: #ede4d0; }
  .news-item {
    padding: 9px 0; border-bottom: 1px solid #ede4d0;
    cursor: pointer; transition: opacity 0.15s;
    text-decoration: none; display: block;
  }
  .news-item:last-child { border-bottom: none; }
  .news-item:hover { opacity: 0.7; }
  .news-headline { font-size: 13px; font-weight: 500; color: #2c2416; line-height: 1.4; margin-bottom: 3px; }
  .news-meta { font-size: 11px; color: #9a8a6a; }

  @media (max-width: 620px) {
    .grid { grid-template-columns: 1fr; }
    .full-row { grid-column: 1; }
    body { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="dash">

  <div class="header">
    <div class="header-left">
      <h1 id="greeting">Good morning, Kevin.</h1>
      <p>Phoenix, AZ &mdash; here's your day.</p>
    </div>
    <div class="clock">
      <div class="clock-time" id="clock">--:--</div>
      <div class="clock-date" id="clockdate"></div>
    </div>
  </div>

  <div class="grid">

    <!-- WEATHER -->
    <div class="card">
      <div class="card-title">
        Phoenix weather
        <button class="refresh-btn" onclick="fetchWeather()">&#8635; refresh</button>
      </div>
      <div id="weather-content"><div class="muted-text">Fetching conditions...</div></div>
    </div>

    <!-- QUOTE -->
    <div class="card">
      <div class="card-title">
        Daily intention
        <button class="icon-btn" id="qbtn" title="Next quote">&#8635;</button>
      </div>
      <div class="quote-text" id="quote-text"></div>
      <div class="quote-author" id="quote-author"></div>
    </div>

    <!-- PROJECTS -->
    <div class="card">
      <div class="card-title">
        Active projects
        <button class="small-add-btn" id="proj-add-btn" title="Add project">+</button>
      </div>
      <div id="projects-list"></div>
      <div class="project-form" id="project-form">
        <div class="form-row">
          <input class="form-input" id="pf-name" placeholder="Project name" />
          <input class="form-input" id="pf-tag" placeholder="Tag (e.g. board game)" />
        </div>
        <div class="form-row">
          <select class="form-select" id="pf-status">
            <option value="active">Active</option>
            <option value="slow">In progress</option>
            <option value="paused">On hold</option>
          </select>
          <button class="form-save-btn" id="pf-save">Save</button>
          <button class="form-cancel-btn" id="pf-cancel">Cancel</button>
        </div>
      </div>
    </div>

    <!-- CALENDAR -->
    <div class="card">
      <div class="card-title">
        Week ahead
        <span style="font-size:10px;color:#b0a08a;font-weight:400">click a day to add</span>
      </div>
      <div id="calendar"></div>
    </div>

    <!-- INBOX -->
    <div class="card full-row">
      <div class="card-title">
        Quick capture
        <span class="inbox-count" id="inbox-count"></span>
      </div>
      <div class="inbox-input-row">
        <input class="inbox-input" id="inbox-input" placeholder="Capture an idea, task, or research thread..." maxlength="300" />
        <select class="inbox-tag-select" id="inbox-tag">
          <option value="idea">idea</option>
          <option value="task">task</option>
          <option value="research">research</option>
          <option value="project">project</option>
        </select>
        <button class="inbox-add-btn" id="inbox-add-btn">+ Add</button>
      </div>
      <div id="inbox-list"></div>
    </div>

    <!-- NEWS -->
    <div class="card full-row">
      <div class="card-title">
        Morning briefing
        <button class="refresh-btn" onclick="fetchNews(currentCat,true)">&#8635; refresh</button>
      </div>
      <div class="news-tabs" id="news-tabs">
        <button class="news-tab active" data-cat="world">World</button>
        <button class="news-tab" data-cat="tech">Tech &amp; AI</button>
        <button class="news-tab" data-cat="history">History</button>
        <button class="news-tab" data-cat="phoenix">Phoenix</button>
        <button class="news-tab" data-cat="science">Science</button>
      </div>
      <div id="news-list"><div class="muted-text">Fetching live headlines...</div></div>
    </div>

  </div>
</div>

<script>
// ── STORAGE HELPERS ───────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// ── CLOCK ─────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
  const ampm = h >= 12 ? 'pm' : 'am', h12 = h % 12 || 12;
  document.getElementById('clock').textContent = h12 + ':' + m + ' ' + ampm;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clockdate').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
  document.getElementById('greeting').textContent = (h<12?'Good morning':h<17?'Good afternoon':'Good evening') + ', Kevin.';
}
updateClock();
setInterval(updateClock, 30000);

// ── QUOTES ────────────────────────────────────────────────
const quotes = [
  { text: "The most courageous act is still to think for yourself. Aloud.", author: "Coco Chanel" },
  { text: "History is not a burden on the memory but an illumination of the soul.", author: "Lord Acton" },
  { text: "A man who does not know what happened before he was born goes through life like a child.", author: "Cicero" },
  { text: "All that is gold does not glitter, not all those who wander are lost.", author: "J.R.R. Tolkien" },
  { text: "Tell me, what is it you plan to do with your one wild and precious life?", author: "Mary Oliver" },
  { text: "The present moment always will have been.", author: "Epictetus" },
  { text: "Every battle is won before it is fought.", author: "Sun Tzu" },
  { text: "Go to bed smarter than when you woke up.", author: "Charlie Munger" },
  { text: "A ship in harbor is safe, but that is not what ships are for.", author: "John A. Shedd" },
  { text: "The farther backward you can look, the farther forward you are likely to see.", author: "Winston Churchill" },
  { text: "We are all apprentices in a craft where no one ever becomes a master.", author: "Ernest Hemingway" },
  { text: "Not all those who wander are lost — but a map never hurts.", author: "Anonymous" },
];
let quoteIdx = Math.floor(Math.random() * quotes.length);
function showQuote() {
  const q = quotes[quoteIdx % quotes.length];
  document.getElementById('quote-text').textContent = '\u201c' + q.text + '\u201d';
  document.getElementById('quote-author').textContent = '\u2014 ' + q.author;
}
document.getElementById('qbtn').onclick = () => { quoteIdx++; showQuote(); };
showQuote();

// ── PROJECTS ──────────────────────────────────────────────
const DEFAULT_PROJECTS = [
  { id:1, name:'8th Air Force vs Luftwaffe', tag:'WWII board game', status:'active' },
  { id:2, name:'McIlvaine Family History', tag:'Genealogy / documentary', status:'active' },
  { id:3, name:'Geopolitical Watchdog', tag:'Dashboard tool', status:'active' },
  { id:4, name:'Misery Loves Harmony', tag:'Dystopian fiction', status:'slow' },
  { id:5, name:'Technomads', tag:'Strategy board game', status:'slow' },
  { id:6, name:'House of Gramech', tag:'Wine / microbrewery concept', status:'paused' },
];

let projects = load('kevin_projects', DEFAULT_PROJECTS);
let editingProjectId = null;

const statusCycle = { active:'slow', slow:'paused', paused:'active' };
const statusMap = {
  active: { dot:'dot-active', badge:'badge-active', label:'active' },
  slow:   { dot:'dot-slow',   badge:'badge-slow',   label:'in progress' },
  paused: { dot:'dot-paused', badge:'badge-paused', label:'on hold' },
};

function renderProjects() {
  const list = document.getElementById('projects-list');
  list.innerHTML = '';
  projects.forEach(p => {
    const s = statusMap[p.status] || statusMap.paused;
    const div = document.createElement('div');
    div.className = 'project-item';
    div.innerHTML = `
      <div class="project-dot ${s.dot}"></div>
      <div class="project-body">
        <div class="project-name" style="cursor:pointer" data-edit="${p.id}">${p.name}</div>
        <div class="project-tag">${p.tag}</div>
      </div>
      <div class="project-badge ${s.badge}" data-cycle="${p.id}" title="Click to cycle status">${s.label}</div>
      <button class="project-del" data-del="${p.id}">&times;</button>`;
    list.appendChild(div);
  });

  list.querySelectorAll('[data-cycle]').forEach(el => {
    el.onclick = () => {
      const p = projects.find(x => x.id === +el.dataset.cycle);
      if (p) { p.status = statusCycle[p.status] || 'active'; save('kevin_projects', projects); renderProjects(); }
    };
  });

  list.querySelectorAll('[data-del]').forEach(el => {
    el.onclick = () => {
      if (confirm('Remove "' + (projects.find(x=>x.id===+el.dataset.del)||{}).name + '"?')) {
        projects = projects.filter(x => x.id !== +el.dataset.del);
        save('kevin_projects', projects);
        renderProjects();
      }
    };
  });

  list.querySelectorAll('[data-edit]').forEach(el => {
    el.onclick = () => {
      const p = projects.find(x => x.id === +el.dataset.edit);
      if (!p) return;
      editingProjectId = p.id;
      document.getElementById('pf-name').value = p.name;
      document.getElementById('pf-tag').value = p.tag;
      document.getElementById('pf-status').value = p.status;
      document.getElementById('pf-save').textContent = 'Update';
      document.getElementById('project-form').classList.add('open');
    };
  });
}

document.getElementById('proj-add-btn').onclick = () => {
  editingProjectId = null;
  document.getElementById('pf-name').value = '';
  document.getElementById('pf-tag').value = '';
  document.getElementById('pf-status').value = 'active';
  document.getElementById('pf-save').textContent = 'Save';
  document.getElementById('project-form').classList.toggle('open');
};

document.getElementById('pf-cancel').onclick = () => {
  document.getElementById('project-form').classList.remove('open');
  editingProjectId = null;
};

document.getElementById('pf-save').onclick = () => {
  const name = document.getElementById('pf-name').value.trim();
  const tag  = document.getElementById('pf-tag').value.trim();
  const status = document.getElementById('pf-status').value;
  if (!name) return;
  if (editingProjectId) {
    const p = projects.find(x => x.id === editingProjectId);
    if (p) { p.name = name; p.tag = tag; p.status = status; }
  } else {
    const newId = projects.length ? Math.max(...projects.map(x=>x.id)) + 1 : 1;
    projects.unshift({ id: newId, name, tag, status });
  }
  save('kevin_projects', projects);
  renderProjects();
  document.getElementById('project-form').classList.remove('open');
  editingProjectId = null;
};

renderProjects();

// ── CALENDAR ──────────────────────────────────────────────
// Events stored as { dateKey: ["event text", ...] }
// dateKey format: "YYYY-MM-DD"
let calEvents = load('kevin_cal', {});

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function buildCalendar() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';
  const today = new Date();
  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const key = dateKey(d);
    const isToday = i === 0;
    const evs = calEvents[key] || [];

    const dayDiv = document.createElement('div');
    dayDiv.className = 'cal-day';

    const header = document.createElement('div');
    header.className = 'cal-day-header';
    header.innerHTML = `
      <div class="cal-date-block">
        <span class="cal-num">${d.getDate()}</span>
        <span class="cal-dow">${dows[d.getDay()]}</span>
      </div>
      <div class="cal-events" id="cal-evs-${key}">
        ${isToday ? '<span class="today-tag">today</span>' : ''}
        ${evs.length
          ? evs.map((e,ei) => `<div class="cal-event">${e}<button class="cal-event-del" data-key="${key}" data-ei="${ei}">&times;</button></div>`).join('')
          : '<span class="cal-empty">open</span>'}
      </div>`;

    const addRow = document.createElement('div');
    addRow.className = 'cal-add-row';
    addRow.id = 'cal-add-' + key;
    addRow.innerHTML = `
      <input class="cal-add-input" id="cal-input-${key}" placeholder="Add event..." maxlength="80" />
      <button class="cal-add-confirm" data-key="${key}">Add</button>
      <button class="cal-add-cancel" data-key="${key}">Cancel</button>`;

    header.onclick = (e) => {
      if (e.target.classList.contains('cal-event-del') || e.target.classList.contains('cal-add-confirm') || e.target.classList.contains('cal-add-cancel')) return;
      const row = document.getElementById('cal-add-' + key);
      const isOpen = row.classList.contains('open');
      document.querySelectorAll('.cal-add-row.open').forEach(r => r.classList.remove('open'));
      if (!isOpen) { row.classList.add('open'); document.getElementById('cal-input-' + key).focus(); }
    };

    dayDiv.appendChild(header);
    dayDiv.appendChild(addRow);
    cal.appendChild(dayDiv);
  }

  // Event delegation for add/delete
  cal.querySelectorAll('.cal-add-confirm').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const key = btn.dataset.key;
      const input = document.getElementById('cal-input-' + key);
      const text = input.value.trim();
      if (!text) return;
      if (!calEvents[key]) calEvents[key] = [];
      calEvents[key].push(text);
      save('kevin_cal', calEvents);
      buildCalendar();
    };
  });

  cal.querySelectorAll('.cal-add-cancel').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      document.getElementById('cal-add-' + btn.dataset.key).classList.remove('open');
    };
  });

  cal.querySelectorAll('.cal-event-del').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const key = btn.dataset.key;
      const ei = +btn.dataset.ei;
      calEvents[key].splice(ei, 1);
      if (!calEvents[key].length) delete calEvents[key];
      save('kevin_cal', calEvents);
      buildCalendar();
    };
  });

  cal.querySelectorAll('.cal-add-input').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.stopPropagation(); input.closest('.cal-add-row').querySelector('.cal-add-confirm').click(); }
      if (e.key === 'Escape') { e.stopPropagation(); input.closest('.cal-add-row').querySelector('.cal-add-cancel').click(); }
    });
    input.onclick = e => e.stopPropagation();
  });
}

buildCalendar();

// ── WEATHER ───────────────────────────────────────────────
async function fetchWeather() {
  document.getElementById('weather-content').innerHTML = '<div class="muted-text">Fetching conditions...</div>';
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=33.4484&longitude=-112.0740&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/Phoenix&forecast_days=1');
    const d = await res.json();
    const c = d.current;
    const hi = Math.round(d.daily.temperature_2m_max[0]);
    const lo = Math.round(d.daily.temperature_2m_min[0]);
    const code = c.weathercode;
    const icons = code===0?['☀️','Clear and sunny']:code<=2?['⛅','Partly cloudy']:code<=3?['☁️','Overcast']:code<=45?['🌫️','Foggy']:code<=67?['🌧️','Rain']:code<=77?['❄️','Snow']:code<=82?['🌦️','Showers']:['⛈️','Thunderstorms'];
    document.getElementById('weather-content').innerHTML = `
      <div class="weather-main">
        <div class="weather-icon">${icons[0]}</div>
        <div><div class="weather-temp">${Math.round(c.temperature_2m)}°F</div><div class="weather-desc">${icons[1]}</div></div>
      </div>
      <div class="weather-hi-lo">H: ${hi}° &nbsp;&nbsp; L: ${lo}°</div>
      <div class="weather-row">
        <div class="weather-stat">Humidity <span>${Math.round(c.relative_humidity_2m)}%</span></div>
        <div class="weather-stat">Wind <span>${Math.round(c.windspeed_10m)} mph</span></div>
      </div>`;
  } catch(e) {
    document.getElementById('weather-content').innerHTML = '<div class="muted-text">Weather unavailable — check your connection.</div>';
  }
}
fetchWeather();

// ── INBOX ─────────────────────────────────────────────────
let inboxItems = load('kevin_inbox', []);

function saveInbox() { save('kevin_inbox', inboxItems); }

function updateInboxCount() {
  const n = inboxItems.filter(i => !i.done).length;
  document.getElementById('inbox-count').textContent = n > 0 ? n + ' pending' : 'all clear';
}

function renderInbox() {
  const list = document.getElementById('inbox-list');
  if (!inboxItems.length) {
    list.innerHTML = '<div class="inbox-empty">Nothing captured yet — drop ideas here as they hit you.</div>';
    updateInboxCount(); return;
  }
  list.innerHTML = '';
  inboxItems.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'inbox-item';
    const pillClass = { idea:'pill-idea', task:'pill-task', research:'pill-research', project:'pill-project' }[item.tag] || 'pill-idea';
    div.innerHTML = `<div class="inbox-check${item.done?' done':''}" data-idx="${idx}"></div><div class="inbox-text${item.done?' done':''}">${item.text}</div><div class="inbox-pill ${pillClass}">${item.tag}</div><button class="inbox-del" data-del="${idx}">&times;</button>`;
    list.appendChild(div);
  });
  list.querySelectorAll('.inbox-check').forEach(el => {
    el.onclick = () => { inboxItems[+el.dataset.idx].done = !inboxItems[+el.dataset.idx].done; saveInbox(); renderInbox(); };
  });
  list.querySelectorAll('.inbox-del').forEach(el => {
    el.onclick = () => { inboxItems.splice(+el.dataset.del,1); saveInbox(); renderInbox(); };
  });
  updateInboxCount();
}

function addInboxItem() {
  const input = document.getElementById('inbox-input');
  const tag = document.getElementById('inbox-tag').value;
  const text = input.value.trim();
  if (!text) return;
  inboxItems.unshift({ text, tag, done:false, ts:Date.now() });
  saveInbox(); renderInbox();
  input.value = ''; input.focus();
}

document.getElementById('inbox-add-btn').onclick = addInboxItem;
document.getElementById('inbox-input').addEventListener('keydown', e => { if (e.key==='Enter') addInboxItem(); });
renderInbox();

// ── NEWS (RSS via allorigins CORS proxy, parsed as XML) ───
const RSS_FEEDS = {
  world:   'https://feeds.reuters.com/reuters/topNews',
  tech:    'https://feeds.arstechnica.com/arstechnica/index',
  history: 'https://www.smithsonianmag.com/rss/history-archaeology/',
  phoenix: 'https://rssfeeds.azcentral.com/rss/news',
  science: 'https://www.sciencedaily.com/rss/top/science.xml',
};

const CORS_PROXY = 'https://api.allorigins.win/get?url=';

const RSS_FALLBACKS = {
  world:   'https://feeds.bbci.co.uk/news/world/rss.xml',
  tech:    'https://hnrss.org/frontpage?points=100',
  history: 'https://feeds.bbci.co.uk/news/world/rss.xml',
  phoenix: 'https://feeds.bbci.co.uk/news/us-and-canada/rss.xml',
  science: 'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml',
};

const newsCache = {};
let currentCat = 'world';

function parseRSS(xmlText, cat) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const items = Array.from(doc.querySelectorAll('item')).slice(0, 6);
  const feedTitle = doc.querySelector('channel > title')?.textContent || cat;
  return items.map(item => ({
    headline: item.querySelector('title')?.textContent?.trim() || '',
    source: feedTitle,
    url: item.querySelector('link')?.textContent?.trim() || '#',
    date: (() => {
      const pd = item.querySelector('pubDate')?.textContent;
      return pd ? new Date(pd).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '';
    })(),
  })).filter(a => a.headline);
}

async function tryFeed(url) {
  const res = await fetch(CORS_PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error('bad response');
  const data = await res.json();
  if (!data.contents) throw new Error('empty');
  return data.contents;
}

async function fetchNews(cat, force) {
  if (newsCache[cat] && !force) { renderNews(newsCache[cat]); return; }
  document.getElementById('news-list').innerHTML = '<div class="muted-text">Fetching live headlines...</div>';
  let xml = null;
  try { xml = await tryFeed(RSS_FEEDS[cat]); } catch(e) {
    try { xml = await tryFeed(RSS_FALLBACKS[cat]); } catch(e2) {
      document.getElementById('news-list').innerHTML = '<div class="muted-text">Could not load headlines — check your connection and try refreshing.</div>';
      return;
    }
  }
  const articles = parseRSS(xml, cat);
  if (!articles.length) {
    document.getElementById('news-list').innerHTML = '<div class="muted-text">No headlines found — try refreshing.</div>';
    return;
  }
  newsCache[cat] = articles;
  renderNews(articles);
}

function renderNews(articles) {
  const nl = document.getElementById('news-list');
  nl.innerHTML = '';
  articles.forEach(n => {
    const a = document.createElement('a');
    a.className = 'news-item';
    a.href = (n.url && n.url.startsWith('http')) ? n.url : '#';
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.innerHTML = `<div class="news-headline">${n.headline}</div><div class="news-meta">${[n.source,n.date].filter(Boolean).join(' · ')}</div>`;
    nl.appendChild(a);
  });
}

document.getElementById('news-tabs').querySelectorAll('.news-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.news-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    fetchNews(currentCat);
  };
});

fetchNews('world');
